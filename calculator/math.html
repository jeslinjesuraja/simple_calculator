<!DOCTYPE html>
<html>

<head>
<title>Calculator</title>
</head>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}


h2 {
    margin-bottom: 20px;
}


input, select {
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
    width: 120px;
    font-size: 14px;
}


button {
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background: #0056b3;
}


#result {
    margin-top: 15px;
    color: #333;
}
</style>
<body>

<div class="container">
    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="Enter number 1">

    <select id="operator">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="number" id="num2" placeholder="Enter number 2">

    <br><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>
</div>

<script type="module" src="app.js"></script>

</body>

</html>
